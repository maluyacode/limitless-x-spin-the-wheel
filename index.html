<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#05010f" />
<title>LIMITLESS X — Raffle Draw | Converge FiberX</title>
<style>
  /* ============ RESET / BASE ============ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root{
    --nearblack:#05010f;
    --teal:#35dacb;          /* bright turquoise — matches RAFFLE DRAW text + KV */
    --teal-deep:#12a99b;
    --violet:#7b2ff7;
    --violet-lite:#a25cff;
    --purple-deep:#4a1a9e;
    --navy:#2a0e5c;
    --lav:#e7ddff;
    --white:#ffffff;
    --safe-t: env(safe-area-inset-top, 0px);
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-l: env(safe-area-inset-left, 0px);
    --safe-r: env(safe-area-inset-right, 0px);
  }
  html,body{ width:100%; overflow-x:hidden; }
  body{
    font-family:"Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
    color:var(--lav);
    background:var(--nearblack);
    min-height:100vh; min-height:100dvh;
    padding: calc(var(--safe-t) + 6px) var(--safe-r) calc(var(--safe-b) + 20px) var(--safe-l);
    position:relative;
    -webkit-tap-highlight-color: transparent;
    line-height:1.4;
  }

  /* ============ KEY-VISUAL BACKGROUND ============ */
  .kv-bg{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:url("Limitless-X-Main-KV-For-raffle-roulette.png");
    background-size:cover;
    background-position:center 42%;
    background-repeat:no-repeat;
  }
  /* vignette so wheel + text stay legible over the busy X core */
  .kv-overlay{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background:
      radial-gradient(circle at 50% 44%, rgba(5,1,15,.62) 0%, rgba(5,1,15,.30) 30%, rgba(5,1,15,0) 62%),
      linear-gradient(180deg, rgba(5,1,15,.55) 0%, rgba(5,1,15,.15) 26%, rgba(5,1,15,.20) 74%, rgba(5,1,15,.7) 100%);
  }

  /* ============ LAYOUT SHELL ============ */
  .wrap{
    position:relative; z-index:3;
    max-width:640px; margin:0 auto;
    padding:8px 16px 30px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:calc(100dvh - 24px);
  }

  /* ============ WORDMARK + HEADING ============ */
  .draw-title{
    margin-top:0; text-align:center;
    font-weight:900; letter-spacing:.14em;
    font-size:clamp(28px, 8.8vw, 56px);
    color:var(--teal);
    text-transform:uppercase;
    text-shadow:0 2px 6px rgba(0,0,0,.55);   /* subtle dark shadow for legibility — no neon glow */
  }

  /* ============ WHEEL STAGE ============ */
  .stage{
    display:flex; flex-direction:column; align-items:center;
    width:100%;
  }
  .wheel-holder{
    position:relative;
    width:min(92vw, calc(100dvh - 180px), 520px);
    aspect-ratio:1/1;
    margin:6px auto 2px;
    touch-action:manipulation;
  }
  .wheel-holder canvas{
    position:absolute; inset:0; width:100%; height:100%;
    display:block; border-radius:50%;
    filter:drop-shadow(0 6px 34px rgba(53,218,203,.28));
  }
  /* rotating ring glow behind the wheel */
  .ring{
    position:absolute; inset:-3.2%; border-radius:50%;
    background:conic-gradient(from 0deg, var(--teal), var(--violet), #2b6bff, var(--teal-deep), var(--teal));
    filter:blur(11px); opacity:.6; z-index:-1;
    animation:spinring 7s linear infinite;
  }
  @keyframes spinring{ to{ transform:rotate(360deg);} }
  @media (prefers-reduced-motion: reduce){ .ring{ animation:none; } }

  /* pointer at 12 o'clock, pointing DOWN — teal like reference */
  .pointer{
    position:absolute; top:-1.5%; left:50%; transform:translateX(-50%);
    width:0; height:0; z-index:6;
    border-left:11px solid transparent;
    border-right:11px solid transparent;
    border-top:19px solid var(--teal);
    filter:drop-shadow(0 2px 6px rgba(53,218,203,.85));
  }

  /* small center hub (decorative + clickable) */
  .hub{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:9%; height:9%; border-radius:50%; z-index:5;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; border:none; padding:0;
    background:radial-gradient(circle at 40% 36%, #ffffff 0%, var(--teal) 34%, #0c8f83 74%, #071a2e 100%);
    box-shadow:0 0 0 3px rgba(6,12,32,.92), 0 0 14px rgba(53,218,203,.7), inset 0 0 8px rgba(255,255,255,.4);
    transition:transform .12s ease, box-shadow .2s ease;
  }
  .hub:hover{ transform:translate(-50%,-50%) scale(1.12); box-shadow:0 0 0 3px rgba(6,12,32,.92), 0 0 22px rgba(53,218,203,1), inset 0 0 8px rgba(255,255,255,.5); }
  .hub:active{ transform:translate(-50%,-50%) scale(.94); }
  .hub:disabled{ cursor:not-allowed; filter:grayscale(.4) brightness(.8); }
  .hub:focus-visible{ outline:3px solid var(--teal); outline-offset:4px; }

  /* ============ SPIN BUTTON (violet, reference style) ============ */
  .spin-btn{
    margin:16px auto 4px; display:block;
    min-width:min(56vw, 200px);
    padding:10px 30px; border-radius:16px;
    font-size:clamp(16px,4vw,20px); font-weight:900; letter-spacing:2px;
    text-transform:uppercase; color:#fff; cursor:pointer;
    background:linear-gradient(180deg, #a25cff 0%, var(--violet) 46%, #5f1fb5 100%);
    border:2px solid rgba(216,204,245,.92);
    box-shadow:
      0 6px 0 #3d1580,
      0 12px 26px rgba(123,47,247,.5),
      inset 0 2px 4px rgba(255,255,255,.4),
      inset 0 -4px 10px rgba(58,12,120,.5);
    text-shadow:0 1px 8px rgba(0,0,0,.4);
    transition:transform .08s ease, box-shadow .12s ease, filter .2s ease;
    position:relative; overflow:hidden;
    -webkit-user-select:none; user-select:none;
  }
  .spin-btn::before{
    content:""; position:absolute; top:0; left:-60%; width:40%; height:100%;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.6), transparent);
    transform:skewX(-20deg);
    animation:sheen 3.4s ease-in-out infinite;
  }
  @keyframes sheen{ 0%{ left:-60%;} 55%,100%{ left:130%; } }
  .spin-btn:hover{ filter:brightness(1.07); }
  .spin-btn:active{ transform:translateY(4px); box-shadow:0 2px 0 #3d1580, 0 4px 14px rgba(123,47,247,.4), inset 0 2px 4px rgba(255,255,255,.4); }
  .spin-btn:disabled{ filter:grayscale(.6) brightness(.72); cursor:not-allowed; box-shadow:0 6px 0 #2a1044, 0 8px 18px rgba(0,0,0,.4); }
  .spin-btn:focus-visible{ outline:3px solid var(--teal); outline-offset:4px; }
  @media (prefers-reduced-motion: reduce){ .spin-btn::before{ animation:none; display:none; } }

  /* discreet reset / edit links — keep a real raffle from being a dead-end */
  .link-row{
    display:flex; align-items:center; justify-content:center;
    gap:4px; flex-wrap:wrap; margin-top:2px;
  }
  .reset-link{
    margin-top:0; appearance:none; cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    background:none; border:none; text-decoration:none;
    color:rgba(231,221,255,.7); font-size:12.5px; line-height:1; letter-spacing:1.5px;
    text-transform:uppercase; font-weight:700; padding:8px 12px; min-height:40px;
  }
  /* icon glyph normalized to text presentation so the ↻ and ✎ share metrics/baseline */
  .reset-link .ic{
    font-family:"Segoe UI Symbol", "Segoe UI", system-ui, sans-serif;
    font-size:14px; line-height:1; font-variant-emoji:text;
  }
  .reset-link:hover{ color:var(--teal); }
  .reset-link:focus-visible{ outline:2px solid var(--teal); outline-offset:2px; border-radius:8px; }
  .reset-link:disabled{ opacity:.4; cursor:not-allowed; }

  /* headings wrapper — inert in portrait, becomes a column beside the wheel in landscape */
  .head{ display:contents; }

  /* ============ TABLET & UP ============
     Scale the whole composition up on larger screens. The wheel stays capped by
     viewport HEIGHT via calc(100dvh - chrome) so it never forces a scrollbar. */
  @media (min-width: 720px){
    .wrap{ max-width:800px; padding:16px 22px 44px; }
    .draw-title{ font-size:clamp(38px, 5.4vw, 60px); margin-top:4px; }
    .wheel-holder{ width:min(80vw, calc(100dvh - 240px), 640px); margin:12px auto 4px; }
    .spin-btn{ min-width:210px; padding:12px 34px; font-size:20px; margin-top:20px; }
    .reset-link{ font-size:13px; }
    .status{ font-size:13.5px; margin-top:10px; }
    .winner-card .wn{ font-size:clamp(30px, 5vw, 46px); }
  }

  /* ============ LANDSCAPE / WIDE SCREENS (tablet · laptop · desktop · projector) ============
     One height-aware rule for every wide landscape screen. Headings scale with vh so
     they grow from tablet up to projector; the wheel reserves the real chrome via
     calc(84dvh - 260px) so the whole draw fits with NO scroll at any height. The
     short-phone rule below overrides this only for <=430px-tall landscape phones. */
  @media (min-width: 720px) and (orientation: landscape){
    body{ padding-bottom: calc(var(--safe-b) + 10px); }
    .wrap{ max-width:980px; padding-top:12px; padding-bottom:14px; }
    .draw-title{ font-size:clamp(26px, 5.2vh, 62px); margin-top:4px; }
    .wheel-holder{ width:min(60vw, calc(92dvh - 190px), 680px); margin:8px auto 2px; }
    .spin-btn{ margin-top:16px; padding:11px 32px; font-size:clamp(16px, 2.4vh, 21px); min-width:200px; }
    .reset-link{ font-size:13px; }
    .status{ margin-top:8px; }
    .winner-card .wn{ font-size:clamp(28px, 4.6vh, 46px); }
  }

  /* ============ LANDSCAPE PHONE (very short) ============
     Only genuine phones in landscape (<=430px tall): the wheel alone can be taller
     than the screen, so lay the headings + wheel/button side-by-side and cap the
     wheel by viewport HEIGHT so both stay visible without scrolling. Desktops/laptops
     (even with display scaling) keep the centered reference layout above. */
  @media (max-height: 430px) and (orientation: landscape){
    body{ padding-bottom: calc(var(--safe-b) + 4px); }
    .head{ display:flex; }
    .wrap{
      flex-direction:row; flex-wrap:wrap;
      align-items:center; justify-content:center;
      column-gap:4vw; min-height:0;
      padding-top:4px; padding-bottom:8px;
    }
    .head{
      flex:0 1 auto; flex-direction:column; align-items:center; justify-content:center;
      text-align:center;
    }
    .draw-title{ font-size:clamp(18px, 4.6vh, 30px); }
    .stage{ flex:0 1 auto; width:auto; }
    .wheel-holder{ width:min(56vh, 46vw, 380px); margin:2px auto; }
    .spin-btn{ margin:7px auto 2px; padding:10px 30px; font-size:clamp(16px, 4vh, 22px); min-width:min(46vw, 240px); }
    .reset-link{ min-height:30px; padding:4px 10px; }
    .status{ margin-top:2px; }
  }

  /* ============ STATUS ============ */
  .status{
    text-align:center; font-size:12.5px; margin-top:6px; min-height:18px;
    color:rgba(231,221,255,.85);
  }
  .status.err{ color:#ffb4ec; }
  .status.ok{ color:var(--teal); }

  /* ============ WINNER MODAL ============ */
  .modal{
    position:fixed; inset:0; z-index:50;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .modal[hidden]{ display:none; }
  .modal-backdrop{
    position:absolute; inset:0;
    background:radial-gradient(circle at 50% 38%, rgba(10,4,24,.7), rgba(4,1,12,.9));
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    animation:fadeIn .25s ease;
  }
  @keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }
  .winner-card{
    position:relative; z-index:1;
    width:min(92vw, 460px); margin:0; text-align:center;
    padding:30px 26px 26px; border-radius:22px;
    background:linear-gradient(160deg, rgba(20,8,44,.97), rgba(12,5,30,.97));
    border:1.5px solid rgba(53,218,203,.6);
    box-shadow:0 0 46px rgba(53,218,203,.45), 0 22px 60px rgba(0,0,0,.6), inset 0 0 26px rgba(123,47,247,.18);
    animation:pop .5s cubic-bezier(.2,1.5,.4,1);
  }
  @keyframes pop{ 0%{ transform:scale(.6); opacity:0; } 60%{ transform:scale(1.05); } 100%{ transform:scale(1); opacity:1; } }
  .modal-close{
    position:absolute; top:10px; right:12px;
    width:36px; height:36px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.08); border:1px solid rgba(231,221,255,.28);
    color:var(--lav); font-size:22px; line-height:1; cursor:pointer;
    transition:background .15s ease, border-color .15s ease, color .15s ease;
  }
  .modal-close:hover{ background:rgba(255,43,214,.2); border-color:rgba(255,120,230,.6); color:#fff; }
  .modal-close:focus-visible{ outline:2px solid var(--teal); outline-offset:2px; }
  .winner-card .wl{ font-size:13px; letter-spacing:5px; text-transform:uppercase; color:var(--teal); font-weight:800; }
  .winner-card .wn{
    font-size:clamp(28px,8vw,44px); font-weight:900; color:var(--white); line-height:1.1;
    margin-top:10px; word-break:break-word; text-shadow:0 0 22px rgba(53,218,203,.55);
  }
  .winner-card .wsub{ font-size:12.5px; color:var(--lav); margin-top:12px; }
  .winner-card .wsub b{ color:var(--teal); }
  .again-btn{
    margin-top:20px; padding:12px 34px; border-radius:14px;
    font-size:16px; font-weight:800; letter-spacing:1px; text-transform:uppercase; cursor:pointer;
    color:#fff; border:2px solid rgba(216,204,245,.85);
    background:linear-gradient(180deg,#a25cff 0%, var(--violet) 55%, #6a1fb5 100%);
    box-shadow:0 4px 0 #3d1580, 0 8px 20px rgba(123,47,247,.45);
    transition:transform .08s ease, filter .15s ease;
  }
  .again-btn:hover{ filter:brightness(1.08); }
  .again-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #3d1580, 0 4px 12px rgba(123,47,247,.4); }
  .again-btn:focus-visible{ outline:3px solid var(--teal); outline-offset:3px; }
  .again-btn[disabled]{ filter:grayscale(.6) brightness(.72); cursor:not-allowed; box-shadow:0 4px 0 #2a1044; }
  @media (prefers-reduced-motion: reduce){ .winner-card, .modal-backdrop{ animation:none; } }

  /* ============ CONFETTI ============ */
  #confetti{ position:fixed; inset:0; width:100%; height:100%; z-index:60; pointer-events:none; }

  .sr-only{
    position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden;
    clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }
</style>
</head>
<body>
  <h1 class="sr-only">Raffle Draw — spin the wheel winner picker for the Converge FiberX Student League event</h1>

  <!-- key-visual background -->
  <div class="kv-bg" aria-hidden="true"></div>
  <div class="kv-overlay" aria-hidden="true"></div>

  <div class="wrap">

    <div class="head">
      <div class="draw-title">Raffle Draw</div>
    </div>

    <!-- WHEEL -->
    <div class="stage">
      <div class="wheel-holder" id="wheelHolder">
        <div class="ring" aria-hidden="true"></div>
        <div class="pointer" aria-hidden="true"></div>
        <canvas id="wheel" aria-label="Spinning prize wheel of participant names"></canvas>
        <button class="hub" id="hub" type="button" aria-label="Spin the wheel"></button>
      </div>

      <button class="spin-btn" id="spinBtn" type="button">SPIN!</button>
      <div class="link-row">
        <button class="reset-link" id="resetBtn" type="button"><span class="ic" aria-hidden="true">&#x21BB;&#xFE0E;</span>Reset Wheel</button>
        <a class="reset-link" id="editLink" href="names.html"><span class="ic" aria-hidden="true">&#x270E;&#xFE0E;</span>Edit Names</a>
      </div>

      <div class="status" id="status" role="status" aria-live="polite">Loading names…</div>
    </div>

    <!-- WINNER MODAL -->
    <div class="modal" id="winnerModal" hidden>
      <div class="modal-backdrop" id="modalBackdrop"></div>
      <div class="winner-card" id="winnerCard" role="alertdialog" aria-modal="true" aria-labelledby="winnerName" aria-describedby="winnerSub">
        <button class="modal-close" id="modalClose" type="button" aria-label="Close">&times;</button>
        <div class="wl">★ Winner ★</div>
        <div class="wn" id="winnerName"></div>
        <div class="wsub" id="winnerSub"><b>LIMITLESS X</b> Raffle Draw — Converge FiberX</div>
        <button class="again-btn" id="againBtn" type="button">Spin Again</button>
      </div>
    </div>

  </div>

  <canvas id="confetti" aria-hidden="true"></canvas>

<script>
(function(){
  "use strict";

  /* ============ CONFIG ============ */
  var REMOVE_WINNER = true;   // no repeats: winner leaves the wheel automatically
  var STORAGE_KEY = "limitlessx.names";   // shared with names.html editor

  /* Built-in seed list so the wheel is full on first run. The Edit Names page
     (names.html) writes an edited list to localStorage, which overrides this.
     Keep this in sync with DEFAULT_NAMES in names.html. */
  var DEFAULT_NAMES = [
    "Juan Dela Cruz","Maria Santos","Angelo Reyes","Bea Mercado","Kian Villanueva",
    "Chloe Bautista","Miguel Torres","Sophia Ramos","Nathaniel Cruz","Isabella Aquino",
    "Rafael Domingo","Andrea Navarro","Joshua Mendoza","Camille Salvador","Gabriel Flores",
    "Nicole Gutierrez","Sebastian Lim","Patricia Ocampo","Vincent Castro","Hannah Del Rosario"
  ];

  /* ============ STATE ============ */
  var allNames = [];   // master list (mutated only on reset/reload)
  var pool = [];       // names currently on the wheel
  var winners = [];    // drawn winners
  var rotation = 0;    // current wheel rotation (radians)
  var spinning = false;

  /* teal + purple palette (reference): teal alternates with rotating purples */
  var TEAL   = { fill:"#35dacb", glow:"#35dacb" };
  var PURPLES = [
    { fill:"#7b2ff7", glow:"#7b2ff7" }, // violet
    { fill:"#3a1276", glow:"#5a1fb0" }, // deep purple
    { fill:"#2a0e5c", glow:"#4a1a9e" }  // dark navy-purple
  ];
  function sliceColor(i, N){
    // even slices teal, odd slices a rotating purple -> teal every other slice
    if(i % 2 === 0){
      // avoid teal meeting teal at the seam when N is odd
      if(N % 2 === 1 && i === N-1) return PURPLES[1];
      return TEAL;
    }
    return PURPLES[((i-1)/2) % PURPLES.length];
  }

  /* ============ DOM ============ */
  var canvas   = document.getElementById("wheel");
  var ctx      = canvas.getContext("2d");
  var holder   = document.getElementById("wheelHolder");
  var hub      = document.getElementById("hub");
  var spinBtn  = document.getElementById("spinBtn");
  var resetBtn = document.getElementById("resetBtn");
  var statusEl = document.getElementById("status");
  var winModal = document.getElementById("winnerModal");
  var winCard  = document.getElementById("winnerCard");
  var winName  = document.getElementById("winnerName");
  var modalClose   = document.getElementById("modalClose");
  var modalBackdrop= document.getElementById("modalBackdrop");
  var againBtn = document.getElementById("againBtn");
  var confetti = document.getElementById("confetti");
  var cctx     = confetti.getContext("2d");

  /* ============ WINNER MODAL ============ */
  function openWinnerModal(){
    if(pool.length === 0){
      againBtn.textContent = "All Names Drawn";
      againBtn.disabled = true;
    } else {
      againBtn.textContent = "Spin Again";
      againBtn.disabled = false;
    }
    winModal.hidden = false;
    (againBtn.disabled ? modalClose : againBtn).focus();
  }
  function closeWinnerModal(){
    winModal.hidden = true;
  }

  /* ============ HELPERS ============ */
  function setStatus(msg, kind){
    statusEl.textContent = msg;
    statusEl.className = "status" + (kind ? " " + kind : "");
  }
  function parseNames(text){
    return text.split(/\r?\n/)
      .map(function(l){ return l.trim(); })
      .filter(function(l){ return l.length > 0 && l.charAt(0) !== "#"; });
  }

  /* ============ CANVAS SIZING (DPR aware) ============ */
  var cssSize = 300;
  function sizeCanvas(){
    var rect = holder.getBoundingClientRect();
    cssSize = Math.max(120, Math.round(rect.width));
    var dpr = window.devicePixelRatio || 1;
    canvas.width  = Math.round(cssSize * dpr);
    canvas.height = Math.round(cssSize * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    drawWheel();
  }

  /* ============ WHEEL DRAW ============ */
  function drawWheel(){
    var N = pool.length;
    var cx = cssSize/2, cy = cssSize/2;
    var R = cssSize/2 - 4;
    ctx.clearRect(0,0,cssSize,cssSize);

    // outer rim
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI*2);
    ctx.lineWidth = 4;
    ctx.strokeStyle = "rgba(231,221,255,.28)";
    ctx.stroke();
    ctx.restore();

    if(N === 0){
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, R-2, 0, Math.PI*2);
      ctx.fillStyle = "rgba(8,3,20,.85)";
      ctx.fill();
      ctx.fillStyle = "#e7ddff";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.font = "700 " + Math.max(13, cssSize*0.05) + "px 'Segoe UI', sans-serif";
      ctx.fillText("All names drawn", cx, cy - 8);
      ctx.font = "600 " + Math.max(11, cssSize*0.035) + "px 'Segoe UI', sans-serif";
      ctx.fillStyle = "#35dacb";
      ctx.fillText("Reset the wheel to go again", cx, cy + 16);
      ctx.restore();
      return;
    }

    var seg = (Math.PI*2)/N;
    // Labels live in the OUTER band (between innerR and outerR) where slices are wide
    // enough. Size the font to the slice height at the inner (narrowest) end of the
    // text so names never spill into neighbouring slices, with an absolute cap for
    // readability. This scales the font down automatically as the name count grows.
    var innerR = R * 0.35;
    var outerR = R * 0.96;
    var fontPx = Math.max(8, Math.min(innerR * seg * 0.78, cssSize * 0.043));

    for(var i=0;i<N;i++){
      var a0 = i*seg + rotation;
      var a1 = a0 + seg;
      var col = sliceColor(i, N);

      // slice fill with soft radial sheen
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, R-2, a0, a1);
      ctx.closePath();
      var grad = ctx.createRadialGradient(cx, cy, R*0.12, cx, cy, R);
      grad.addColorStop(0, shade(col.fill, 0.42));
      grad.addColorStop(1, col.fill);
      ctx.fillStyle = grad;
      ctx.fill();

      // thin separator
      ctx.lineWidth = 1.6;
      ctx.strokeStyle = "rgba(5,1,15,.55)";
      ctx.stroke();

      // label
      var mid = a0 + seg/2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(mid);
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      ctx.font = "800 " + fontPx + "px 'Segoe UI', sans-serif";
      ctx.fillStyle = pickTextColor(col.fill);
      ctx.shadowColor = "rgba(0,0,0,.55)";
      ctx.shadowBlur = 3;
      var maxTextW = outerR - innerR;
      var label = fitText(pool[i], maxTextW, fontPx);
      ctx.fillText(label, outerR, 0);
      ctx.restore();
      ctx.shadowBlur = 0;
    }

    // inner hub backing ring (small, matches the little center hub)
    ctx.beginPath();
    ctx.arc(cx, cy, R*0.075, 0, Math.PI*2);
    ctx.fillStyle = "rgba(6,12,32,.92)";
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = "rgba(53,218,203,.7)";
    ctx.stroke();
  }

  function fitText(str, maxW, fontPx){
    ctx.font = "800 " + fontPx + "px 'Segoe UI', sans-serif";
    if(ctx.measureText(str).width <= maxW) return str;
    var ell = "…";
    var lo = 0, hi = str.length, best = "";
    while(lo <= hi){
      var mid = (lo+hi)>>1;
      var cand = str.slice(0, mid).trimEnd() + ell;
      if(ctx.measureText(cand).width <= maxW){ best = cand; lo = mid+1; }
      else { hi = mid-1; }
    }
    return best || ell;
  }

  function pickTextColor(hex){
    var c = hexToRgb(hex);
    var lum = (0.299*c.r + 0.587*c.g + 0.114*c.b);
    return lum > 150 ? "#06122e" : "#ffffff";
  }
  function hexToRgb(hex){
    hex = hex.replace("#","");
    return { r:parseInt(hex.substr(0,2),16), g:parseInt(hex.substr(2,2),16), b:parseInt(hex.substr(4,2),16) };
  }
  function shade(hex, amt){
    var c = hexToRgb(hex);
    var r = Math.round(c.r + (255-c.r)*amt);
    var g = Math.round(c.g + (255-c.g)*amt);
    var b = Math.round(c.b + (255-c.b)*amt);
    return "rgb("+r+","+g+","+b+")";
  }

  /* ============ UI SYNC ============ */
  function updateControls(){
    var noPool = pool.length === 0;
    spinBtn.disabled = spinning || noPool;
    hub.disabled = spinning || noPool;
    resetBtn.disabled = spinning || (winners.length === 0 && pool.length === allNames.length);
  }

  /* ============ SPIN MATH ============
     N slices, seg = 2π/N. Slice i occupies [i*seg, i*seg+seg] locally,
     drawn at world angle (local + rotation). Pointer fixed at top = -π/2.
     Center of slice i (world) = i*seg + seg/2 + R (final rotation).
     Need that ≡ -π/2 (mod 2π)  =>  R ≡ -π/2 - (i*seg + seg/2) (mod 2π).
  */
  function spin(){
    if(spinning || pool.length === 0) return;
    var N = pool.length;
    var seg = (Math.PI*2)/N;

    var idx = Math.floor(Math.random() * N); // uniformly random winner
    var TAU = Math.PI*2;
    var pointer = -Math.PI/2;

    var targetResidue = pointer - (idx*seg + seg/2);
    targetResidue = ((targetResidue % TAU) + TAU) % TAU;

    var curr = ((rotation % TAU) + TAU) % TAU;
    var jitter = (Math.random() - 0.5) * seg * 0.6; // stay well inside slice

    var delta = targetResidue - curr;
    var turns = 6 + Math.floor(Math.random()*3); // 6,7,8 full turns
    var totalRotation = delta + jitter + turns*TAU;
    while(totalRotation < turns*TAU) totalRotation += TAU;

    var startRot = rotation;
    var endRot   = rotation + totalRotation;
    var duration = 4600 + Math.random()*400;
    var startTs  = null;
    var done     = false;

    spinning = true;
    updateControls();
    closeWinnerModal();
    setStatus("Spinning… good luck!", "");

    function easeOutCubic(t){ return 1 - Math.pow(1-t, 3); }

    function settle(){
      if(done) return;
      done = true;
      rotation = endRot;
      drawWheel();
      finishSpin(idx);
    }
    function frame(ts){
      if(done) return;
      if(startTs === null) startTs = ts;
      var t = Math.min(1, (ts - startTs) / duration);
      rotation = startRot + (endRot - startRot)*easeOutCubic(t);
      drawWheel();
      if(t < 1){ requestAnimationFrame(frame); } else { settle(); }
    }
    requestAnimationFrame(frame);
    // safety net if rAF gets throttled (tab backgrounded mid-spin)
    setTimeout(settle, duration + 1500);
  }

  function finishSpin(idx){
    spinning = false;
    var name = pool[idx];

    winName.textContent = name; // auto-escaped
    setStatus("🎉 We have a winner!", "ok");

    winners.push(name);
    fireConfetti();

    if(REMOVE_WINNER){ pool.splice(idx, 1); }
    updateControls();
    drawWheel();

    openWinnerModal();   // after removal so "Spin Again" reflects the remaining pool

    if(pool.length === 0){
      setStatus("All names drawn — reset the wheel to play again.", "");
    }
  }

  /* ============ CONFETTI ============ */
  var confParticles = [];
  var confRunning = false;
  var COLORS = ["#35dacb","#7b2ff7","#a25cff","#2b6bff","#ffffff","#12a99b"];

  function sizeConfetti(){
    var dpr = window.devicePixelRatio || 1;
    confetti.width = Math.round(window.innerWidth * dpr);
    confetti.height= Math.round(window.innerHeight * dpr);
    cctx.setTransform(dpr,0,0,dpr,0,0);
  }
  function fireConfetti(){
    sizeConfetti();
    var W = window.innerWidth;
    var cx = W/2, cy = window.innerHeight*0.35;
    for(var i=0;i<150;i++){
      var ang = Math.random()*Math.PI*2;
      var speed = 4 + Math.random()*9;
      confParticles.push({
        x:cx + (Math.random()-0.5)*80,
        y:cy + (Math.random()-0.5)*40,
        vx:Math.cos(ang)*speed,
        vy:Math.sin(ang)*speed - 4,
        g:0.16 + Math.random()*0.12,
        size:5 + Math.random()*7,
        rot:Math.random()*Math.PI,
        vr:(Math.random()-0.5)*0.4,
        color:COLORS[(Math.random()*COLORS.length)|0],
        life:1,
        decay:0.006 + Math.random()*0.008
      });
    }
    if(!confRunning){ confRunning = true; requestAnimationFrame(confStep); }
  }
  function confStep(){
    cctx.clearRect(0,0,window.innerWidth,window.innerHeight);
    var alive = 0;
    for(var i=0;i<confParticles.length;i++){
      var p = confParticles[i];
      if(p.life <= 0) continue;
      alive++;
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life -= p.decay;
      cctx.save();
      cctx.globalAlpha = Math.max(0, p.life);
      cctx.translate(p.x, p.y);
      cctx.rotate(p.rot);
      cctx.fillStyle = p.color;
      cctx.shadowColor = p.color;
      cctx.shadowBlur = 8;
      cctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
      cctx.restore();
    }
    if(alive > 0){ requestAnimationFrame(confStep); }
    else { confParticles.length = 0; confRunning = false; cctx.clearRect(0,0,window.innerWidth,window.innerHeight); }
  }

  /* ============ LOAD NAMES ============ */
  function applyNames(names){
    allNames = names.slice();
    pool = names.slice();
    winners = [];
    rotation = 0;
    closeWinnerModal();
    updateControls();
    drawWheel();
  }
  /* Read the saved list from localStorage (written by the names.html editor). Returns an
     array of names, or null when nothing usable is stored. Guarded so a disabled/blocked
     localStorage (rare private-mode setups) never breaks the wheel. */
  function loadStoredNames(){
    var raw;
    try { raw = window.localStorage.getItem(STORAGE_KEY); }
    catch(e){ return null; }
    if(raw == null) return null;
    var names = parseNames(raw);
    return names.length > 0 ? names : null;
  }
  /* Seed localStorage with the default list the first time the app runs, so the editor
     opens pre-filled instead of blank. Never overwrites an existing saved list. */
  function seedStorageIfEmpty(){
    try {
      if(window.localStorage.getItem(STORAGE_KEY) == null){
        window.localStorage.setItem(STORAGE_KEY, DEFAULT_NAMES.join("\n"));
      }
    } catch(e){ /* storage unavailable — the wheel still works from DEFAULT_NAMES */ }
  }

  /* ============ EVENTS ============ */
  spinBtn.addEventListener("click", spin);
  hub.addEventListener("click", spin);

  // winner modal: close via ✕, backdrop click, or the "Spin Again" button
  modalClose.addEventListener("click", closeWinnerModal);
  winModal.addEventListener("click", function(e){
    if(e.target === winModal || e.target === modalBackdrop) closeWinnerModal();
  });
  againBtn.addEventListener("click", function(){
    closeWinnerModal();
    if(pool.length > 0) spin();
  });

  document.addEventListener("keydown", function(e){
    // while the winner modal is open, Esc closes it and other keys are ignored
    if(!winModal.hidden){
      if(e.key === "Escape" || e.code === "Escape"){ e.preventDefault(); closeWinnerModal(); }
      return;
    }
    var tag = (e.target && e.target.tagName) || "";
    if(tag === "INPUT" || tag === "TEXTAREA") return;
    if(e.code === "Space" || e.key === " " || e.code === "Enter" || e.key === "Enter"){
      e.preventDefault(); spin();
    }
  });
  resetBtn.addEventListener("click", function(){
    if(allNames.length === 0){ setStatus("No names loaded yet.", "err"); return; }
    applyNames(allNames);
    setStatus("Wheel reset — " + allNames.length + " names back in play.", "ok");
  });
  var resizeTimer = null;
  window.addEventListener("resize", function(){
    if(resizeTimer) cancelAnimationFrame(resizeTimer);
    resizeTimer = requestAnimationFrame(sizeCanvas);
  });

  /* ============ INIT ============ */
  sizeConfetti();
  sizeCanvas();
  seedStorageIfEmpty();                 // first run: prime the editor with DEFAULT_NAMES
  var stored = loadStoredNames();       // list saved by the names.html editor, if any
  var names = stored || DEFAULT_NAMES;
  applyNames(names);
  setStatus("Loaded " + names.length + " name" + (names.length>1?"s":"") + ". Ready to spin!", "ok");
})();
</script>
</body>
</html>
